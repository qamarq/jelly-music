<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JellyMusic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
    }
    #bg {
      background-size: cover;
      background-position: center;
      filter: blur(55px) brightness(0.75) saturate(1.5);
      transform: scale(1.2);
    }
    #progressFill { transition: width 0.25s linear; }
    #artwork { transition: opacity 0.3s ease; }
    .icon { width: 24px; height: 24px; }
  </style>
</head>
<body class="h-full w-full overflow-hidden font-sans text-white">
  <cast-media-player class="fixed inset-0 -z-20"></cast-media-player>
  <div id="bg" class="fixed inset-0"></div>
  <div class="fixed inset-0 bg-black/25"></div>

  <div class="fixed left-10 top-8 z-30">
    <span class="text-lg font-semibold tracking-wide text-white/70">JellyMusic</span>
  </div>

  <div id="player" class="fixed inset-0 z-10 hidden flex-row items-center gap-14 px-20">
    <img id="artwork" class="h-64 w-64 shrink-0 rounded-3xl object-cover shadow-2xl" src="" alt="" />

    <div class="flex min-w-0 max-w-2xl flex-col gap-3">
      <h1 id="title" class="truncate text-4xl font-semibold">&mdash;</h1>
      <p id="artist" class="truncate text-xl text-white/70">&mdash;</p>

      <div class="mt-3 flex w-[30rem] items-center gap-4">
        <div
          id="playPauseButton"
          class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-white/15"
        >
          <svg id="playIcon" class="icon" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z" /></svg>
          <svg id="pauseIcon" class="icon hidden" viewBox="0 0 24 24" fill="white"><path d="M6 5h4v14H6zm8 0h4v14h-4z" /></svg>
        </div>

        <span id="currentTime" class="w-10 text-right text-sm text-white/60">0:00</span>
        <div id="progressBar" class="relative h-1.5 flex-1 rounded-full bg-white/20">
          <div id="progressFill" class="h-full rounded-full bg-white" style="width: 0%"></div>
        </div>
        <span id="duration" class="w-10 text-sm text-white/60">0:00</span>
      </div>
    </div>
  </div>

  <div id="idle" class="fixed inset-0 z-20 flex items-center justify-center">
    <div class="text-center">
      <div class="text-3xl font-semibold text-white/85">JellyMusic</div>
      <div class="mt-2 text-white/40">Ready to cast</div>
    </div>
  </div>

  <div id="errorBanner" class="fixed inset-0 z-50 hidden items-start justify-center overflow-auto bg-black/90 p-8">
    <pre id="errorText" class="max-w-full whitespace-pre-wrap break-words rounded-2xl border border-red-500/40 bg-red-950/60 p-6 text-left text-base text-red-200"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
